<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#00615E"/>
  <meta name="description" content="Acompanhe seus investimentos mês a mês"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Total Investido"/>
  <title>Total Investido</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #F5F8F6; }
    #app-shell {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      margin: 0 auto;
      background: #F5F8F6;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #root {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    @media (min-width: 480px) {
      body { background: #E8EDEA; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      #app-shell {
        height: min(900px, 96dvh);
        border-radius: 28px;
        box-shadow: 0 24px 60px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.06);
        overflow: hidden;
      }
    }
    input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #C5D0CA; border-radius: 4px; }
    button:focus-visible { outline: 2px solid #7AB648; outline-offset: 2px; }
  </style>
</head>
<body>
  <div id="app-shell">
    <div id="root"></div>
  </div>

  <!-- 100% self-hosted — funciona sem internet após 1ª carga -->
  <script src="react.production.min.js"></script>
  <script src="react-dom.production.min.js"></script>
  <script src="babel.min.js"></script>

  <script type="text/babel" src="components.js"></script>
  <script type="text/babel" src="forms.js"></script>
  <script type="text/babel" src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(r => console.log('[SW] registrado', r.scope))
          .catch(e => console.warn('[SW] erro:', e));
      });
    }
  </script>
</body>
</html>
